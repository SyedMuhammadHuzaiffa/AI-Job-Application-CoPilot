[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q --cov=src/job_copilot --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
branch = true
source = ["src/job_copilot"]
omit = ["src/job_copilot/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
